<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#07111f">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/icon-192.png">
<title>FM Squad Planner</title>
<style>
:root{--bg:#07111f;--panel:#101827;--line:#2b3b58;--text:#f8fafc;--muted:#94a3b8;--blue:#3b82f6;--green:#22c55e;--red:#ef4444;--yellow:#eab308;--purple:#a855f7;--orange:#f97316;--cyan:#06b6d4}
*{box-sizing:border-box}html,body{margin:0;width:100%;min-height:100%;overflow-x:hidden}body{font-family:Arial,sans-serif;color:var(--text);background:radial-gradient(circle at top,#172554 0,#07111f 48%,#030712 100%)}
header{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;background:rgba(3,7,18,.9);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20}.brand h1{font-size:22px;margin:0}.brand p{margin:3px 0 0;color:var(--muted);font-size:12px}.status{background:#0f172a;border:1px solid var(--line);padding:9px 12px;border-radius:999px;color:var(--muted);font-size:14px}.status strong{color:white}
.layout{width:100%;max-width:1600px;margin:0 auto;padding:14px;display:grid;grid-template-columns:335px minmax(0,1fr);gap:14px}.panel{background:linear-gradient(180deg,rgba(30,41,59,.97),rgba(15,23,42,.97));border:1px solid var(--line);border-radius:18px;padding:14px;box-shadow:0 16px 45px rgba(0,0,0,.22)}.panel+.panel{margin-top:14px}
h2{font-size:18px;margin:0 0 10px}label{font-size:12px;color:var(--muted);display:block;margin-top:8px}input,select,textarea,button{width:100%;padding:10px 12px;border-radius:12px;border:1px solid var(--line);background:#0f172a;color:white;outline:none;margin-top:6px}button{background:linear-gradient(135deg,#2563eb,#7c3aed);border:0;font-weight:800;cursor:pointer}.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}.btn-danger{background:linear-gradient(135deg,#dc2626,#7f1d1d)}.btn-green{background:linear-gradient(135deg,#16a34a,#065f46)}.btn-ghost{background:#111827;border:1px solid var(--line)}.btn-orange{background:linear-gradient(135deg,#f97316,#9a3412)}
.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}.tab-btn{background:#111827;border:1px solid var(--line);font-size:13px;padding:10px 6px}.tab-btn.active{background:linear-gradient(135deg,#2563eb,#7c3aed)}.tab{display:none}.tab.active{display:block}.hint{color:var(--muted);font-size:13px;line-height:1.45}
.item,.player{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:8px;align-items:center;background:#17233a;border:1px solid #334155;padding:10px;margin:8px 0;border-radius:14px;cursor:pointer;user-select:none;max-width:100%}.player.selected{border-color:#93c5fd;box-shadow:0 0 0 3px rgba(59,130,246,.28);background:#1e3a8a}.name{font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.meta{color:#cbd5e1;font-size:12px;margin-top:4px;line-height:1.35;overflow-wrap:anywhere}.badge{display:inline-block;font-size:11px;border-radius:999px;padding:3px 7px;margin-top:5px;background:rgba(59,130,246,.18);border:1px solid rgba(96,165,250,.35);color:#bfdbfe}.actions{display:flex;gap:5px}.icon-btn{width:30px;height:30px;padding:0;margin:0;border-radius:10px;background:#0f172a;border:1px solid #475569;font-size:14px}
.toolbar{display:grid;grid-template-columns:1.2fr 1fr 120px 120px;gap:10px;align-items:end;margin-bottom:12px}.mini-stat{background:#0f172a;border:1px solid var(--line);border-radius:14px;padding:10px;color:var(--muted);font-size:13px}.mini-stat strong{display:block;color:white;font-size:20px}.pitch-wrap{width:100%;overflow:hidden;border-radius:22px;border:1px solid var(--line);background:#081225}.pitch{width:100%;height:clamp(390px,55vw,650px);max-height:calc(100vh - 180px);min-height:360px;position:relative;overflow:hidden;border-radius:22px;border:3px solid rgba(255,255,255,.86);background:linear-gradient(90deg,rgba(255,255,255,.055) 50%,rgba(0,0,0,.04) 50%),linear-gradient(#188344,#166534);background-size:14.28% 100%,100% 100%}.pitch:before{content:"";position:absolute;left:50%;top:0;height:100%;border-left:2px solid rgba(255,255,255,.55)}.pitch:after{content:"";position:absolute;left:50%;top:50%;width:min(110px,16vw);height:min(110px,16vw);border:2px solid rgba(255,255,255,.55);border-radius:50%;transform:translate(-50%,-50%)}.box-mark{position:absolute;left:50%;transform:translateX(-50%);border:2px solid rgba(255,255,255,.45);width:34%;height:15%;z-index:1}.box-top{top:-2px;border-top:0}.box-bottom{bottom:-2px;border-bottom:0}
.slot{position:absolute;z-index:2;width:clamp(76px,8.7vw,118px);min-height:clamp(48px,5vw,62px);padding:6px;border-radius:14px;background:rgba(2,6,23,.64);border:1px dashed rgba(255,255,255,.86);text-align:center;cursor:pointer;transform:translate(-50%,-50%)}.slot-title{font-size:12px;font-weight:900}.empty-text{font-size:11px;color:#dbeafe;margin-top:4px}.slot .player{display:block;text-align:center;padding:5px;margin:4px 0 0;border-radius:10px;font-size:11px;background:#0f172a}.slot .actions,.slot .badge{display:none}.slot .meta{font-size:10px}
.board{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:10px;margin-top:14px}.col{min-height:220px;padding:10px;border-radius:16px;border:1px solid var(--line);background:rgba(15,23,42,.82);cursor:pointer;min-width:0}.col h3{margin:0 0 8px;font-size:14px;display:flex;justify-content:space-between;gap:5px}.count{color:var(--muted);font-size:12px}.dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:6px}.green{background:var(--green)}.blue{background:var(--blue)}.yellow{background:var(--yellow)}.red{background:var(--red)}.orange{background:var(--orange)}.cyan{background:var(--cyan)}
.drop-hover{outline:3px solid #93c5fd}.toast{position:fixed;right:18px;bottom:18px;background:#0f172a;border:1px solid #334155;border-radius:14px;padding:12px 14px;color:#e2e8f0;display:none;z-index:30}
@media(max-width:1180px){.layout{grid-template-columns:1fr}.toolbar{grid-template-columns:1fr 1fr}.toolbar .wide{grid-column:1/-1}.board{grid-template-columns:repeat(2,minmax(0,1fr))}}@media(max-width:640px){header{display:block}.status{margin-top:8px;display:inline-block}.layout{padding:8px}.tabs{grid-template-columns:repeat(2,1fr)}.toolbar{grid-template-columns:1fr}.pitch{height:520px;max-height:none}.board{grid-template-columns:1fr}}
</style>
</head>
<body>
<header><div class="brand"><h1>FM Squad Planner</h1><p id="appSub"></p></div><div id="selectedStatus" class="status"></div></header>
<div class="layout">
<aside>
<div class="tabs"><button class="tab-btn active" data-tab="playersTab" data-i18n="tabPlayer"></button><button class="tab-btn" data-tab="targetTab" data-i18n="tabTargets"></button><button class="tab-btn" data-tab="incomingTab" data-i18n="tabIncoming"></button><button class="tab-btn" data-tab="dataTab" data-i18n="tabData"></button></div>
<section id="playersTab" class="tab active">
<div class="panel"><h2 data-i18n="playerAddTitle"></h2><label data-i18n="playerName"></label><input id="playerName" placeholder="Arda Güler"><label data-i18n="age"></label><input id="playerAge" type="number"><label data-i18n="club"></label><input id="playerClub"><label data-i18n="position"></label><select id="playerPosition"></select><label data-i18n="role"></label><select id="playerRole"></select><label data-i18n="value"></label><input id="playerValue" placeholder="€10M / €50k"><button id="addPlayerBtn" data-i18n="addPlayer"></button><div class="btn-row"><button id="updatePlayerBtn" class="btn-green" data-i18n="update"></button><button id="deletePlayerBtn" class="btn-danger" data-i18n="delete"></button></div><div class="btn-row"><button id="clearSelectionBtn" class="btn-ghost" data-i18n="clearSelection"></button><button id="resetBtn" class="btn-danger" data-i18n="reset"></button></div><p class="hint" data-i18n="hint"></p></div>
<div class="panel"><h2><span data-i18n="playerPool"></span> <span id="poolCount" class="count">0</span></h2><div id="players" class="dropzone"></div></div>
</section>
<section id="targetTab" class="tab"><div class="panel"><h2 data-i18n="targetTitle"></h2><label data-i18n="playerName"></label><input id="targetName"><label data-i18n="position"></label><input id="targetPos"><label data-i18n="priority"></label><input id="targetNote"><button id="addTargetBtn" class="btn-orange" data-i18n="addTarget"></button></div><div class="panel"><h2><span data-i18n="transferTargets"></span> <span id="targetCount" class="count">0</span></h2><div id="targets"></div></div></section>
<section id="incomingTab" class="tab"><div class="panel"><h2 data-i18n="incomingPlayer"></h2><label data-i18n="playerName"></label><input id="incomingName"><label data-i18n="position"></label><input id="incomingPos"><label data-i18n="arrivalNote"></label><input id="incomingNote"><button id="addIncomingBtn" class="btn-green" data-i18n="addIncoming"></button></div><div class="panel"><h2><span data-i18n="incoming"></span> <span id="incomingCount" class="count">0</span></h2><div id="incoming"></div></div></section>
<section id="dataTab" class="tab"><div class="panel"><h2 data-i18n="settings"></h2><label data-i18n="language"></label><select id="languageSelect"><option value="tr">Türkçe</option><option value="en">English</option></select><label data-i18n="scenarioName"></label><input id="scenarioName"><button id="saveScenarioBtn" class="btn-green" data-i18n="saveScenario"></button><label data-i18n="savedScenarios"></label><select id="scenarioSelect"></select><div class="btn-row"><button id="loadScenarioBtn" data-i18n="load"></button><button id="deleteScenarioBtn" class="btn-danger" data-i18n="delete"></button></div><button id="exportBtn" class="btn-ghost" data-i18n="exportJson"></button><label data-i18n="importJson"></label><textarea id="importText"></textarea><button id="importBtn" data-i18n="import"></button></div></section>
</aside>
<main>
<section class="panel"><div class="toolbar"><div class="wide"><label data-i18n="formation"></label><select id="formationSelect"></select></div><div class="wide"><label data-i18n="quickMove"></label><select id="quickMoveSelect"><option value="" data-i18n="chooseBox"></option><option value="Substitutes" data-i18n="substitutes"></option><option value="Reserves" data-i18n="reserves"></option><option value="Incoming" data-i18n="incoming"></option><option value="Transfer Targets" data-i18n="transferTargets"></option><option value="Loan List" data-i18n="loanList"></option><option value="Transfer List" data-i18n="transferList"></option></select></div><div class="mini-stat"><strong id="totalPlayers">0</strong><span data-i18n="totalPlayers"></span></div><div class="mini-stat"><strong id="onPitch">0</strong><span data-i18n="onPitch"></span></div></div><div class="pitch-wrap"><div id="pitch" class="pitch"></div></div></section>
<section class="panel"><h2 data-i18n="squadPlanning"></h2><div class="board"><div class="col dropzone squadbox" data-box="Substitutes"><h3><span><i class="dot blue"></i><span data-i18n="substitutes"></span></span><span class="count">0</span></h3></div><div class="col dropzone squadbox" data-box="Reserves"><h3><span><i class="dot cyan"></i><span data-i18n="reserves"></span></span><span class="count">0</span></h3></div><div class="col dropzone squadbox" data-box="Incoming"><h3><span><i class="dot green"></i><span data-i18n="incoming"></span></span><span class="count">0</span></h3></div><div class="col dropzone squadbox" data-box="Transfer Targets"><h3><span><i class="dot orange"></i><span data-i18n="transferTargets"></span></span><span class="count">0</span></h3></div><div class="col dropzone squadbox" data-box="Loan List"><h3><span><i class="dot yellow"></i><span data-i18n="loanList"></span></span><span class="count">0</span></h3></div><div class="col dropzone squadbox" data-box="Transfer List"><h3><span><i class="dot red"></i><span data-i18n="transferList"></span></span><span class="count">0</span></h3></div></div></section>
</main></div><div id="toast" class="toast"></div>
<script>
if("serviceWorker"in navigator)window.addEventListener("load",()=>navigator.serviceWorker.register("./service-worker.js"));
const $=id=>document.getElementById(id),STORAGE_KEY="fmsp-v8-2",SCENARIO_KEY="fmsp-scenarios-v8-2";
const playersList=$("players"),pitch=$("pitch"),selectedStatus=$("selectedStatus");
let selectedPlayer=null,draggedPlayer=null,lang=localStorage.getItem("fmsp-lang")||"tr";
const T={tr:{appSub:"Transferlerini planla. Kadronu kur. Sezonu kazan.",selected:"Seçili",none:"Yok",tabPlayer:"Oyuncu",tabTargets:"Hedef",tabIncoming:"Katılacak",tabData:"Veri",playerAddTitle:"Oyuncu Ekle / Düzenle",playerName:"Oyuncu adı",age:"Yaş",club:"Kulüp",position:"Mevki",role:"FM Rolü",value:"Değer / maaş notu",addPlayer:"Oyuncu Ekle",update:"Güncelle",delete:"Sil",clearSelection:"Temizle",reset:"Sıfırla",hint:"Oyuncuya dokun, sonra saha kutusuna veya kadro kutusuna dokun.",playerPool:"Oyuncu Havuzu",targetTitle:"Transfer Hedefi",priority:"Öncelik / not",addTarget:"Hedef Ekle",transferTargets:"Transfer Hedefleri",incomingPlayer:"Takıma Katılacak Oyuncu",arrivalNote:"Katılım / not",addIncoming:"Katılacak Ekle",incoming:"Takıma Katılacaklar",settings:"Ayarlar / Veri",language:"Dil",scenarioName:"Senaryo adı",saveScenario:"Senaryo Kaydet",savedScenarios:"Kayıtlı senaryolar",load:"Yükle",exportJson:"JSON Dışa Aktar",importJson:"JSON İçe Aktar",import:"İçe Aktar",formation:"Diziliş",quickMove:"Seçili oyuncuyu hızlı taşı",chooseBox:"Kutu seç...",substitutes:"Yedekler",reserves:"Rezervler",loanList:"Kiralanacaklar",transferList:"Satılacaklar",squadPlanning:"Kadro Planlama",totalPlayers:"Toplam oyuncu",onPitch:"Sahada",tap:"Boş"},en:{appSub:"Plan transfers. Build squads. Win seasons.",selected:"Selected",none:"None",tabPlayer:"Player",tabTargets:"Targets",tabIncoming:"Incoming",tabData:"Data",playerAddTitle:"Add / Edit Player",playerName:"Player name",age:"Age",club:"Club",position:"Position",role:"FM Role",value:"Value / wage note",addPlayer:"Add Player",update:"Update",delete:"Delete",clearSelection:"Clear",reset:"Reset",hint:"Tap a player, then tap a pitch slot or squad box.",playerPool:"Player Pool",targetTitle:"Transfer Target",priority:"Priority / note",addTarget:"Add Target",transferTargets:"Transfer Targets",incomingPlayer:"Incoming Player",arrivalNote:"Arrival / note",addIncoming:"Add Incoming",incoming:"Incoming",settings:"Settings / Data",language:"Language",scenarioName:"Scenario name",saveScenario:"Save Scenario",savedScenarios:"Saved scenarios",load:"Load",exportJson:"Export JSON",importJson:"Import JSON",import:"Import",formation:"Formation",quickMove:"Quick move selected player",chooseBox:"Choose box...",substitutes:"Substitutes",reserves:"Reserves",loanList:"Loan List",transferList:"Transfer List",squadPlanning:"Squad Planning",totalPlayers:"Total players",onPitch:"On pitch",tap:"Tap"}};
const positions=[["GK","Goalkeeper","Kaleci"],["SK","Sweeper Keeper","Süpürücü Kaleci"],["DL","Left Back","Sol Bek"],["DCL","Left Centre Back","Sol Stoper"],["DC","Centre Back","Stoper"],["DCR","Right Centre Back","Sağ Stoper"],["DR","Right Back","Sağ Bek"],["WBL","Left Wing Back","Sol Kanat Bek"],["WBR","Right Wing Back","Sağ Kanat Bek"],["DM","Defensive Midfielder","Defansif Orta Saha"],["DML","Left Defensive Midfielder","Sol Defansif Orta Saha"],["DMR","Right Defensive Midfielder","Sağ Defansif Orta Saha"],["MCL","Left Central Midfielder","Sol İç Orta Saha"],["MC","Central Midfielder","Merkez Orta Saha"],["MCR","Right Central Midfielder","Sağ İç Orta Saha"],["ML","Left Midfielder","Sol Orta Saha"],["MR","Right Midfielder","Sağ Orta Saha"],["AML","Left Winger","Sol Kanat"],["AMC","Attacking Midfielder","Ofansif Orta Saha"],["AMR","Right Winger","Sağ Kanat"],["STL","Left Striker","Sol Santrfor"],["ST","Striker","Santrfor"],["STR","Right Striker","Sağ Santrfor"]];
const roles=[["Goalkeeper","Kaleci"],["Sweeper Keeper","Süpürücü Kaleci"],["Full Back","Bek"],["Wing Back","Kanat Bek"],["Inverted Wing Back","Ters Kanat Bek"],["Centre Back","Stoper"],["Ball Playing Defender","Oyun Kurucu Stoper"],["No-Nonsense Centre Back","Sert Stoper"],["Libero","Libero"],["Defensive Midfielder","Defansif Orta Saha"],["Anchor","Çapa"],["Half Back","Yarım Bek"],["Regista","Regista"],["Segundo Volante","Segundo Volante"],["Deep Lying Playmaker","Derinde Oyun Kurucu"],["Ball Winning Midfielder","Top Kazanan Orta Saha"],["Central Midfielder","Merkez Orta Saha"],["Box to Box Midfielder","İki Yönlü Orta Saha"],["Mezzala","Mezzala"],["Carrilero","Carrilero"],["Roaming Playmaker","Gezgin Oyun Kurucu"],["Advanced Playmaker","İleri Oyun Kurucu"],["Winger","Kanat Oyuncusu"],["Inside Forward","İç Forvet"],["Inverted Winger","Ters Kanat"],["Wide Playmaker","Geniş Alan Oyun Kurucusu"],["Trequartista","Trequartista"],["Shadow Striker","Gizli Forvet"],["Enganche","Enganche"],["Advanced Forward","İleri Uç Forvet"],["Deep Lying Forward","Derine Gelen Forvet"],["Pressing Forward","Pres Forveti"],["Target Forward","Hedef Santrfor"],["Complete Forward","Komple Forvet"],["False Nine","Sahte Dokuz"],["Poacher","Golcü Forvet"]];
const formations={"4-2-3-1 Wide":[["ST",50,10],["AML",26,29],["AMC",50,29],["AMR",74,29],["MCL",40,52],["MCR",60,52],["DL",18,75],["DCL",40,75],["DCR",60,75],["DR",82,75],["GK",50,92]],"4-3-3 DM Wide":[["ST",50,10],["AML",27,28],["AMR",73,28],["MCL",38,51],["MCR",62,51],["DM",50,61],["DL",18,76],["DCL",40,76],["DCR",60,76],["DR",82,76],["GK",50,92]],"4-4-2":[["STL",42,12],["STR",58,12],["ML",26,42],["MCL",42,53],["MCR",58,53],["MR",74,42],["DL",18,75],["DCL",40,75],["DCR",60,75],["DR",82,75],["GK",50,92]],"3-5-2":[["STL",42,12],["STR",58,12],["ML",23,48],["MCL",38,52],["MC",50,56],["MCR",62,52],["MR",77,48],["DCL",34,77],["DC",50,79],["DCR",66,77],["GK",50,92]],"5-2-3":[["ST",50,10],["AML",28,30],["AMR",72,30],["MCL",42,55],["MCR",58,55],["WBL",15,62],["WBR",85,62],["DCL",35,78],["DC",50,80],["DCR",65,78],["GK",50,92]],"4-1-4-1":[["ST",50,10],["ML",25,42],["MCL",40,53],["MCR",60,53],["MR",75,42],["DM",50,64],["DL",18,78],["DCL",40,78],["DCR",60,78],["DR",82,78],["GK",50,92]]};
function posLabel(c){let p=positions.find(x=>x[0]===c);return p?`${p[0]} - ${lang==="tr"?p[2]:p[1]}`:c}function roleLabel(e){let r=roles.find(x=>x[0]===e);return r?(lang==="tr"?r[1]:r[0]):e}
function populateSelects(){let op=$("playerPosition").value,or=$("playerRole").value,of=$("formationSelect").value;$("playerPosition").innerHTML=positions.map(([v])=>`<option value="${v}">${posLabel(v)}</option>`).join("");$("playerRole").innerHTML=roles.map(([en])=>`<option value="${en}">${roleLabel(en)}</option>`).join("");$("formationSelect").innerHTML=Object.keys(formations).map(f=>`<option value="${f}">${f}</option>`).join("");if(op)$("playerPosition").value=op;if(or)$("playerRole").value=or;if(of)$("formationSelect").value=of}
function applyLang(){localStorage.setItem("fmsp-lang",lang);$("languageSelect").value=lang;$("appSub").textContent=T[lang].appSub;document.querySelectorAll("[data-i18n]").forEach(el=>{let k=el.dataset.i18n;if(T[lang][k])el.textContent=T[lang][k]});populateSelects();getAllPlayers().forEach(c=>setPlayerData(c,playerData(c)));renderEmptyTexts();updateStatus();refresh()}
function esc(t){return String(t||"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[m]))}function toast(m){let t=$("toast");t.textContent=m;t.style.display="block";setTimeout(()=>t.style.display="none",1500)}
function getAllPlayers(){return[...document.querySelectorAll(".player")]}function playerData(c){return{id:c.id,name:c.dataset.name,age:c.dataset.age,club:c.dataset.club,pos:c.dataset.pos,role:c.dataset.role,value:c.dataset.value}}
function setPlayerData(c,d){c.dataset.name=d.name;c.dataset.age=d.age||"";c.dataset.club=d.club||"";c.dataset.pos=d.pos||"";c.dataset.role=d.role||"";c.dataset.value=d.value||"";let meta=[d.pos,roleLabel(d.role),d.age,d.club].filter(Boolean).join(" • ");c.innerHTML=`<div><div class="name">${esc(d.name)}</div><div class="meta">${esc(meta)}</div><span class="badge">${esc(d.value||"")}</span></div><div class="actions"><button class="icon-btn edit">✏️</button><button class="icon-btn remove">🗑️</button></div>`;c.querySelector(".edit").onclick=e=>{e.stopPropagation();selectPlayer(c);fillForm(c)};c.querySelector(".remove").onclick=e=>{e.stopPropagation();deleteCard(c)}}
function makePlayerCard(d){let c=document.createElement("div");c.className="player";c.draggable=true;c.id=d.id||"player-"+Date.now()+"-"+Math.floor(Math.random()*9999);setPlayerData(c,d);c.onclick=e=>{if(e.target.closest("button"))return;e.stopPropagation();selectPlayer(c);fillForm(c)};c.ondragstart=e=>{draggedPlayer=c;selectPlayer(c);e.dataTransfer.setData("text/plain",c.id)};c.ondragend=()=>{draggedPlayer=null;document.querySelectorAll(".drop-hover").forEach(x=>x.classList.remove("drop-hover"))};return c}
function addPlayer(){let name=$("playerName").value.trim();if(!name)return alert("Oyuncu adı yaz.");let c=makePlayerCard({name,age:$("playerAge").value.trim(),club:$("playerClub").value.trim(),pos:$("playerPosition").value,role:$("playerRole").value,value:$("playerValue").value.trim()});playersList.appendChild(c);["playerName","playerAge","playerClub","playerValue"].forEach(id=>$(id).value="");selectPlayer(c);saveState();refresh()}
function fillForm(c){$("playerName").value=c.dataset.name;$("playerAge").value=c.dataset.age||"";$("playerClub").value=c.dataset.club||"";$("playerPosition").value=c.dataset.pos;$("playerRole").value=c.dataset.role||roles[0][0];$("playerValue").value=c.dataset.value||""}
function updateSelected(){if(!selectedPlayer)return alert("Önce oyuncu seç.");let name=$("playerName").value.trim();if(!name)return;setPlayerData(selectedPlayer,{name,age:$("playerAge").value.trim(),club:$("playerClub").value.trim(),pos:$("playerPosition").value,role:$("playerRole").value,value:$("playerValue").value.trim()});saveState();refresh()}
function deleteCard(c){if(!c)return;if(!confirm((c.dataset.name||"Oyuncu")+" silinsin mi?"))return;if(selectedPlayer===c)selectedPlayer=null;c.remove();saveState();refresh();updateStatus()}function selectPlayer(c){selectedPlayer=c;updateStatus()}function updateStatus(){getAllPlayers().forEach(p=>p.classList.remove("selected"));if(selectedPlayer&&document.body.contains(selectedPlayer)){selectedPlayer.classList.add("selected");selectedStatus.innerHTML=`${T[lang].selected}: <strong>${esc(selectedPlayer.dataset.name)}</strong>`}else{selectedPlayer=null;selectedStatus.innerHTML=`${T[lang].selected}: <strong>${T[lang].none}</strong>`}}
function movePlayerToZone(card,zone){if(!card||!zone)return;if(zone.classList.contains("slot")){let old=zone.querySelector(".player");if(old&&old!==card)playersList.appendChild(old)}zone.appendChild(card);selectPlayer(card);saveState();refresh()}
function attachZoneEvents(z){z.onclick=e=>{if(e.target.closest(".player"))return;if(selectedPlayer)movePlayerToZone(selectedPlayer,z)};z.ondragover=e=>{e.preventDefault();z.classList.add("drop-hover")};z.ondragleave=()=>z.classList.remove("drop-hover");z.ondrop=e=>{e.preventDefault();z.classList.remove("drop-hover");let id=e.dataTransfer.getData("text/plain");movePlayerToZone(document.getElementById(id)||draggedPlayer||selectedPlayer,z)}}
function renderPitch(key,keep=true){let old=keep?[...pitch.querySelectorAll(".player")]:[];old.forEach(p=>playersList.appendChild(p));pitch.innerHTML='<div class="box-mark box-top"></div><div class="box-mark box-bottom"></div>';formations[key].forEach(([pos,x,y])=>{let s=document.createElement("div");s.className="slot empty dropzone";s.dataset.box=pos;s.style.left=x+"%";s.style.top=y+"%";s.innerHTML=`<div class="slot-title">${pos}</div><div class="empty-text">${T[lang].tap}</div>`;attachZoneEvents(s);pitch.appendChild(s)});saveState();refresh()}
function renderEmptyTexts(){document.querySelectorAll(".empty-text").forEach(e=>e.textContent=T[lang].tap)}
function makeItem(type,d){let el=document.createElement("div");el.className="item";el.dataset.name=d.name;el.dataset.pos=d.pos;el.dataset.note=d.note;el.innerHTML=`<div><div class="name">${esc(d.name)}</div><div class="meta">${esc(d.pos)} • ${esc(d.note)}</div></div><button class="icon-btn">🗑️</button>`;el.querySelector("button").onclick=()=>{el.remove();saveState();refresh()};return el}
function itemData(el){return{name:el.dataset.name,pos:el.dataset.pos,note:el.dataset.note}}function addTarget(){let name=$("targetName").value.trim();if(!name)return;$("targets").appendChild(makeItem("target",{name,pos:$("targetPos").value.trim()||"?",note:$("targetNote").value.trim()||"-"}));["targetName","targetPos","targetNote"].forEach(id=>$(id).value="");saveState();refresh()}function addIncoming(){let name=$("incomingName").value.trim();if(!name)return;$("incoming").appendChild(makeItem("incoming",{name,pos:$("incomingPos").value.trim()||"?",note:$("incomingNote").value.trim()||"-"}));["incomingName","incomingPos","incomingNote"].forEach(id=>$(id).value="");saveState();refresh()}
function refresh(){document.querySelectorAll(".slot").forEach(z=>{let has=!!z.querySelector(".player");let e=z.querySelector(".empty-text");if(has&&e)e.remove();if(!has&&!e){let n=document.createElement("div");n.className="empty-text";n.textContent=T[lang].tap;z.appendChild(n)}});document.querySelectorAll(".squadbox").forEach(c=>c.querySelector(".count").textContent=c.querySelectorAll(".player").length);$("totalPlayers").textContent=getAllPlayers().length;$("onPitch").textContent=document.querySelectorAll(".slot .player").length;$("poolCount").textContent=playersList.querySelectorAll(".player").length;$("targetCount").textContent=document.querySelectorAll("#targets .item").length;$("incomingCount").textContent=document.querySelectorAll("#incoming .item").length;updateStatus()}
function getState(){let data={lang,formation:$("formationSelect").value,areas:{},targets:[...document.querySelectorAll("#targets .item")].map(itemData),incoming:[...document.querySelectorAll("#incoming .item")].map(itemData)};data.areas.pool=[...playersList.querySelectorAll(".player")].map(playerData);document.querySelectorAll(".slot,.squadbox").forEach((z,i)=>data.areas[(z.classList.contains("slot")?"slot":"box")+"-"+i+"-"+z.dataset.box]=[...z.querySelectorAll(".player")].map(playerData));return data}
function saveState(){localStorage.setItem(STORAGE_KEY,JSON.stringify(getState()))}function loadState(){let raw=localStorage.getItem(STORAGE_KEY);if(raw){try{applyState(JSON.parse(raw));return true}catch(e){}}return false}
function clearAll(){playersList.innerHTML="";$("targets").innerHTML="";$("incoming").innerHTML="";document.querySelectorAll(".squadbox").forEach(x=>[...x.querySelectorAll(".player")].forEach(p=>p.remove()))}
function applyState(data){selectedPlayer=null;clearAll();lang=data.lang||lang;populateSelects();$("formationSelect").value=data.formation||Object.keys(formations)[0];renderPitch($("formationSelect").value,false);Object.entries(data.areas||{}).forEach(([key,arr])=>{let z=null;if(key==="pool")z=playersList;else{let parts=key.split("-"),idx=parseInt(parts[1]),type=parts[0];z=[...document.querySelectorAll(type==="slot"?".slot":".squadbox")][idx]}if(z)arr.forEach(d=>z.appendChild(makePlayerCard(d)))});(data.targets||[]).forEach(d=>$("targets").appendChild(makeItem("target",d)));(data.incoming||[]).forEach(d=>$("incoming").appendChild(makeItem("incoming",d)));applyLang();refresh()}
function scenarios(){try{return JSON.parse(localStorage.getItem(SCENARIO_KEY)||"{}")}catch(e){return{}}}function saveScenarios(o){localStorage.setItem(SCENARIO_KEY,JSON.stringify(o));renderScenarioSelect()}function renderScenarioSelect(){let s=scenarios();$("scenarioSelect").innerHTML=Object.keys(s).map(k=>`<option value="${esc(k)}">${esc(k)}</option>`).join("")||'<option value="">Kayıt yok</option>'}
document.querySelectorAll(".tab-btn").forEach(b=>b.onclick=()=>{document.querySelectorAll(".tab-btn,.tab").forEach(x=>x.classList.remove("active"));b.classList.add("active");$(b.dataset.tab).classList.add("active")});document.querySelectorAll(".dropzone").forEach(attachZoneEvents);
$("addPlayerBtn").onclick=addPlayer;$("updatePlayerBtn").onclick=updateSelected;$("deletePlayerBtn").onclick=()=>selectedPlayer?deleteCard(selectedPlayer):alert("Önce oyuncu seç.");$("clearSelectionBtn").onclick=()=>{selectedPlayer=null;updateStatus()};$("resetBtn").onclick=()=>{if(confirm("Her şey sıfırlansın mı?")){localStorage.removeItem(STORAGE_KEY);location.reload()}};$("addTargetBtn").onclick=addTarget;$("addIncomingBtn").onclick=addIncoming;$("formationSelect").onchange=e=>renderPitch(e.target.value,true);$("quickMoveSelect").onchange=e=>{let val=e.target.value;if(!val)return;if(!selectedPlayer){alert("Önce oyuncu seç.");e.target.value="";return}let box=[...document.querySelectorAll(".squadbox")].find(x=>x.dataset.box===val);if(box)movePlayerToZone(selectedPlayer,box);e.target.value=""};$("languageSelect").onchange=e=>{lang=e.target.value;applyLang();saveState()};$("exportBtn").onclick=()=>{$("importText").value=JSON.stringify(getState(),null,2)};$("importBtn").onclick=()=>{try{applyState(JSON.parse($("importText").value));saveState()}catch(e){alert("JSON hatalı")}};$("saveScenarioBtn").onclick=()=>{let name=$("scenarioName").value.trim();if(!name)return;let s=scenarios();s[name]=getState();saveScenarios(s)};$("loadScenarioBtn").onclick=()=>{let s=scenarios(),n=$("scenarioSelect").value;if(s[n])applyState(s[n])};$("deleteScenarioBtn").onclick=()=>{let s=scenarios(),n=$("scenarioSelect").value;if(n&&s[n]){delete s[n];saveScenarios(s)}};
populateSelects();renderPitch(Object.keys(formations)[0],false);if(!loadState()){[["Livakovic","30","Fenerbahçe","GK","Goalkeeper","€8M"],["Ferdi Kadıoğlu","24","Brighton","DL","Wing Back","€30M"],["Djiku","30","Fenerbahçe","DC","Ball Playing Defender","€10M"],["Fred","31","Fenerbahçe","MC","Box to Box Midfielder","€12M"],["Szymanski","25","Fenerbahçe","AMC","Advanced Playmaker","€18M"],["Dzeko","38","Fenerbahçe","ST","Target Forward","€2M"]].forEach(([name,age,club,pos,role,value])=>playersList.appendChild(makePlayerCard({name,age,club,pos,role,value})))}$("languageSelect").value=lang;applyLang();renderScenarioSelect();refresh();
</script>
</body></html>
